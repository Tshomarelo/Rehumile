<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/portal/static/img/icons/icon-48x48.png"/>
  <title>Notifications | Rehumile IMS</title>
  <link href="/portal/static/css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <nav id="sidebar" class="sidebar js-sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand d-flex align-items-center p-2" href="/portal/client/">
        <img src="/portal/static/img/rehumile-logo.jpeg" style="height:36px;object-fit:contain" alt="Rehumile TMW">
      </a>
      <ul class="sidebar-nav">
        <li class="sidebar-header">Main</li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/"><i class="align-middle" data-feather="sliders"></i> <span class="align-middle">Dashboard</span></a></li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/tickets/"><i class="align-middle" data-feather="list"></i> <span class="align-middle">My Tickets</span></a></li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/tickets/create/"><i class="align-middle" data-feather="plus-circle"></i> <span class="align-middle">Create Ticket</span></a></li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/billing/"><i class="align-middle" data-feather="file-text"></i> <span class="align-middle">Billing</span></a></li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/profile/"><i class="align-middle" data-feather="user"></i> <span class="align-middle">Profile</span></a></li>
        <li class="sidebar-item active"><a class="sidebar-link" href="/portal/client/notifications/"><i class="align-middle" data-feather="bell"></i> <span class="align-middle">Notifications</span></a></li>
        <li class="sidebar-header">Support</li>
        <li class="sidebar-item"><a class="sidebar-link" href="/portal/client/contact/"><i class="align-middle" data-feather="help-circle"></i> <span class="align-middle">Contact Support</span></a></li>
      </ul>
    </div>
  </nav>
  <div class="main">
    <nav class="navbar navbar-expand navbar-light navbar-bg">
      <a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
      <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">
              <i class="align-middle me-1" data-feather="user"></i><span class="text-dark" id="navUserName">…</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <span class="dropdown-item-text small text-muted" id="navCompanyName"></span>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="/portal/client/profile/"><i class="align-middle me-1" data-feather="user"></i> Profile</a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#" id="logoutBtn"><i class="align-middle me-1" data-feather="log-out"></i> Sign out</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <main class="content">
      <div class="container-fluid p-0">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h1 class="h3 mb-0"><strong>Notifications</strong></h1>
          <button class="btn btn-sm btn-outline-secondary" id="markAllBtn">Mark all as read</button>
        </div>

        <div class="card">
          <div class="card-body p-0" id="notifList">
            <div class="text-center text-muted py-5">Loading…</div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer"><div class="container-fluid"><p class="mb-0 text-muted">Rehumile TMW IMS &copy; 2025</p></div></footer>
  </div>
</div>
<script src="/portal/static/js/app.js"></script>
<script>
(function(){
  const token = localStorage.getItem('ims_access');
  if(!token){ window.location.href='/portal/login/'; return; }
  const userData = JSON.parse(localStorage.getItem('ims_user')||'{}');
  const userName = ((userData.first_name||'')+' '+(userData.last_name||'')).trim()||userData.email||'Client';
  document.getElementById('navUserName').textContent = userName;
  document.getElementById('navCompanyName').textContent = userData.company_name||'';
  document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();localStorage.clear();window.location.href='/portal/login/';};

  const typeIcon = {
    sla_breach:'<span class="badge bg-danger me-2">SLA Breach</span>',
    sla_warning:'<span class="badge bg-warning text-dark me-2">SLA Warning</span>',
    new_incident:'<span class="badge bg-primary me-2">Ticket Update</span>',
    assignment:'<span class="badge bg-info text-dark me-2">Assignment</span>',
    invoice:'<span class="badge bg-success me-2">Invoice</span>',
    general:'<span class="badge bg-secondary me-2">Info</span>',
  };
  const fmtDate = d => d ? new Date(d).toLocaleString('en-ZA',{dateStyle:'medium',timeStyle:'short'}) : '—';

  async function load(){
    const r = await fetch('/portal/api/notifications/',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){localStorage.clear();window.location.href='/portal/login/';return;}
    const data = await r.json();
    const list = document.getElementById('notifList');
    if(!data.notifications.length){
      list.innerHTML='<div class="text-center text-muted py-5"><i data-feather="bell-off" style="width:40px;height:40px;opacity:.3"></i><p class="mt-2">You have no notifications</p></div>';
      feather.replace();return;
    }
    list.innerHTML = data.notifications.map(n=>`
      <div class="d-flex align-items-start p-3 border-bottom ${n.is_read?'':'bg-light'}">
        <div class="flex-grow-1">
          <div class="d-flex align-items-center mb-1 flex-wrap gap-1">
            ${typeIcon[n.type]||typeIcon.general}
            <strong>${n.title}</strong>
            <small class="text-muted ms-auto">${fmtDate(n.created_at)}</small>
          </div>
          <p class="mb-1 text-muted small">${n.message}</p>
          ${n.ticket_id?`<a href="/portal/client/tickets/" class="small text-primary">View ticket ${n.ticket_id} &rarr;</a>`:''}
        </div>
        ${!n.is_read?`<button class="btn btn-sm btn-outline-secondary ms-3 mark-btn" data-id="${n.id}">Mark read</button>`:''}
      </div>`).join('');

    document.querySelectorAll('.mark-btn').forEach(btn=>{
      btn.onclick=async()=>{
        await fetch('/portal/api/notifications/',{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({ids:[btn.dataset.id]})});
        load();
      };
    });
    feather.replace();
  }

  document.getElementById('markAllBtn').onclick=async()=>{
    await fetch('/portal/api/notifications/',{method:'PATCH',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({all:true})});
    load();
  };

  load();
})();
</script>
</body>
</html>
