<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/portal/static/img/icons/icon-48x48.png"/>
  <title>Job Cards | Rehumile IMS</title>
  <link href="/portal/static/css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <nav id="sidebar" class="sidebar js-sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand d-flex align-items-center p-2" href="/portal/dashboard/">
        <img src="/portal/static/img/rehumile-logo.jpeg" style="height:36px;object-fit:contain" alt="Rehumile TMW">
      </a>
      <ul class="sidebar-nav"></ul>
    </div>
  </nav>
  <div class="main">
    <nav class="navbar navbar-expand navbar-light navbar-bg">
      <a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
      <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">
              <i class="align-middle me-1" data-feather="user"></i><span class="text-dark" id="navUserName">…</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <span class="dropdown-item-text small text-muted" id="navUserRole"></span>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#" id="logoutBtn"><i class="align-middle me-1" data-feather="log-out"></i> Sign out</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <main class="content">
      <div class="container-fluid p-0">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h1 class="h3 mb-0"><strong>Job Cards</strong></h1>
          <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newJobModal">
            <i class="align-middle me-1" data-feather="plus"></i> New Job Card
          </button>
        </div>

        <!-- Status filter pills -->
        <div class="mb-3">
          <div class="btn-group btn-group-sm" role="group">
            <button class="btn btn-outline-secondary active" data-status="">All</button>
            <button class="btn btn-outline-secondary" data-status="logged">Logged</button>
            <button class="btn btn-outline-secondary" data-status="in_progress">In Progress</button>
            <button class="btn btn-outline-secondary" data-status="awaiting_parts">Awaiting Parts</button>
            <button class="btn btn-outline-secondary" data-status="ready">Ready</button>
            <button class="btn btn-outline-secondary" data-status="paid_released">Released</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="card-title mb-0">Workshop Queue</h5>
            <span class="badge bg-secondary" id="jcCount"></span>
          </div>
          <div class="card-body p-0">
            <div id="jcLoading" class="text-center py-4 text-muted">Loading…</div>
            <div class="table-responsive" id="jcWrapper" style="display:none">
              <table class="table table-hover my-0">
                <thead><tr>
                  <th>Job #</th><th>Customer</th><th>Device</th><th>Serial</th><th>Status</th><th>Technician</th><th>Created</th><th></th>
                </tr></thead>
                <tbody id="jcTbody"></tbody>
              </table>
            </div>
            <div id="jcEmpty" class="text-center py-5 text-muted" style="display:none">
              <i data-feather="tool" style="width:48px;height:48px;opacity:.3"></i>
              <p class="mt-2">No job cards found.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer"><div class="container-fluid"><p class="mb-0 text-muted">Rehumile TMW IMS &copy; 2025</p></div></footer>
  </div>
</div>

<!-- New Job Card Modal -->
<div class="modal fade" id="newJobModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">New Job Card</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="jcFormAlert" class="alert d-none" role="alert"></div>
        <form id="jcForm">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Customer Name *</label><input class="form-control" id="jcCustName" required></div>
            <div class="col-md-3"><label class="form-label">Phone</label><input class="form-control" id="jcCustPhone" type="tel"></div>
            <div class="col-md-3"><label class="form-label">Email</label><input class="form-control" id="jcCustEmail" type="email"></div>
            <div class="col-md-4"><label class="form-label">Device Type *</label>
              <select class="form-select" id="jcDevType" required>
                <option value="">Select…</option>
                <option>Laptop</option><option>Desktop</option><option>Smartphone</option>
                <option>Tablet</option><option>Printer</option><option>Network Device</option><option>Other</option>
              </select>
            </div>
            <div class="col-md-4"><label class="form-label">Brand</label><input class="form-control" id="jcDevBrand" placeholder="e.g. Dell, HP, Apple"></div>
            <div class="col-md-4"><label class="form-label">Model</label><input class="form-control" id="jcDevModel"></div>
            <div class="col-12"><label class="form-label">Serial Number *</label><input class="form-control" id="jcSerial" required placeholder="Device serial number (compulsory)"></div>
            <div class="col-12"><label class="form-label">Physical Condition *</label><textarea class="form-control" id="jcCondition" rows="2" required placeholder="Describe external physical condition — cracks, missing parts, liquid damage, etc."></textarea></div>
            <div class="col-12"><label class="form-label">Initial Diagnosis *</label><textarea class="form-control" id="jcDiagnosis" rows="2" required placeholder="Initial fault description and diagnostic notes"></textarea></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="jcSubmitBtn">
          <span id="jcSpinner" class="spinner-border spinner-border-sm me-1 d-none"></span>Create Job Card
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/portal/static/js/app.js"></script>
<script src="/portal/static/js/hq-sidebar-menu.js"></script>
<script>(function(){function _i(){var s=document.querySelector('.js-sidebar'),t=document.querySelector('.js-sidebar-toggle');if(!s||!t)return;t.addEventListener('click',function(){setTimeout(function(){localStorage.setItem('ims_sidebar',s.classList.contains('collapsed')?'open':'closed');},50);});}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',_i):_i();})();</script>
<script>
(function(){
  const token=localStorage.getItem('ims_access');
  if(!token){window.location.href='/portal/login/';return;}
  const u=JSON.parse(localStorage.getItem('ims_user')||'{}');
  document.getElementById('navUserName').textContent=((u.first_name||'')+' '+(u.last_name||'')).trim()||u.email||'Staff';
  document.getElementById('navUserRole').textContent=u.role||'';
  document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();localStorage.clear();window.location.href='/portal/login/';};
  if(!['admin','agent','finance','technician','cashier'].includes(u.role)){window.location.href='/portal/dashboard/';return;}

  const statusBadge={logged:'<span class="badge bg-secondary">Logged</span>',in_progress:'<span class="badge bg-primary">In Progress</span>',awaiting_parts:'<span class="badge bg-warning text-dark">Awaiting Parts</span>',ready:'<span class="badge bg-info text-dark">Ready</span>',paid_released:'<span class="badge bg-success">Released</span>',cancelled:'<span class="badge bg-danger">Cancelled</span>'};
  const fmtDate=d=>d?new Date(d).toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'}):'—';

  let currentStatus='';

  async function api(url,opts={}){
    const r=await fetch(url,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
    if(r.status===401){localStorage.clear();window.location.href='/portal/login/';throw new Error('Unauth');}
    return r;
  }

  async function load(){
    document.getElementById('jcLoading').style.display='block';
    document.getElementById('jcWrapper').style.display='none';
    document.getElementById('jcEmpty').style.display='none';
    try{
      const url='/portal/api/job-cards/'+(currentStatus?'?status='+currentStatus:'');
      const r=await api(url);const data=await r.json();
      const items=data.results||[];
      document.getElementById('jcCount').textContent=items.length+' job'+(items.length!==1?'s':'');
      document.getElementById('jcLoading').style.display='none';
      if(!items.length){document.getElementById('jcEmpty').style.display='block';if(window.feather)feather.replace();return;}
      document.getElementById('jcWrapper').style.display='block';
      document.getElementById('jcTbody').innerHTML=items.map(j=>`
        <tr>
          <td><strong>${j.job_number}</strong></td>
          <td>${j.customer_name}<br><small class="text-muted">${j.customer_phone||''}</small></td>
          <td>${j.device_type}${j.device_brand?' — '+j.device_brand:''}</td>
          <td><code>${j.serial_number}</code></td>
          <td>${statusBadge[j.status]||j.status}</td>
          <td>${j.technician||'<span class="text-muted">Unassigned</span>'}</td>
          <td>${fmtDate(j.created_at)}</td>
          <td><a href="/portal/dashboard/job-cards/?id=${j.id}" class="btn btn-sm btn-outline-secondary">View</a></td>
        </tr>`).join('');
      if(window.feather)feather.replace();
    }catch(e){if(e.message!=='Unauth')document.getElementById('jcLoading').textContent='Failed to load.';}
  }

  document.querySelectorAll('[data-status]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('[data-status]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentStatus=btn.dataset.status;
      load();
    });
  });

  document.getElementById('jcSubmitBtn').addEventListener('click',async()=>{
    const btn=document.getElementById('jcSubmitBtn');
    const orig=btn.innerHTML;
    const modalAlert=document.getElementById('jcFormAlert');
    btn.disabled=true;
    btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Creating…';
    modalAlert.className='alert d-none';
    try{
      const r=await api('/portal/api/job-cards/',{
        method:'POST',
        body:JSON.stringify({
          customer_name:document.getElementById('jcCustName').value.trim(),
          customer_phone:document.getElementById('jcCustPhone').value.trim(),
          customer_email:document.getElementById('jcCustEmail').value.trim(),
          device_type:document.getElementById('jcDevType').value,
          device_brand:document.getElementById('jcDevBrand').value.trim(),
          device_model:document.getElementById('jcDevModel').value.trim(),
          serial_number:document.getElementById('jcSerial').value.trim(),
          physical_condition:document.getElementById('jcCondition').value.trim(),
          initial_diagnosis:document.getElementById('jcDiagnosis').value.trim(),
        })
      });
      if(r.ok){
        const data=await r.json();
        bootstrap.Modal.getInstance(document.getElementById('newJobModal')).hide();
        document.getElementById('jcForm').reset();
        // show page-level success alert
        let pageAlert=document.getElementById('pageAlert');
        if(!pageAlert){
          pageAlert=document.createElement('div');
          pageAlert.id='pageAlert';
          pageAlert.className='alert alert-success alert-dismissible fade show';
          pageAlert.role='alert';
          const main=document.querySelector('.container-fluid.p-0');
          main.insertBefore(pageAlert,main.firstChild);
        } else {
          pageAlert.className='alert alert-success alert-dismissible fade show';
        }
        pageAlert.innerHTML='Job Card <strong>'+data.job_number+'</strong> created successfully. <button type="button" class="btn-close" data-bs-dismiss="alert"></button>';
        load();
      }else{
        const err=await r.json().catch(()=>({}));
        modalAlert.className='alert alert-danger';modalAlert.textContent=err.detail||JSON.stringify(err);
      }
    }catch(e){if(e.message!=='Unauth'){modalAlert.className='alert alert-danger';modalAlert.textContent='Network error.';}}
    btn.disabled=false;
    btn.innerHTML=orig;
  });

  load();
})();
</script>
</body>
</html>
