<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/portal/static/img/icons/icon-48x48.png"/>
  <title>POS | Rehumile IMS</title>
  <link href="/portal/static/css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    .pos-item{cursor:pointer;transition:background .15s}
    .pos-item:hover{background:#f8f9fa}
    #receipt{font-family:'Courier New',monospace;font-size:13px;background:#fff;border:1px dashed #ccc;padding:16px;border-radius:4px}
  </style>
</head>
<body>
<div class="wrapper">
  <nav id="sidebar" class="sidebar js-sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand d-flex align-items-center p-2" href="/portal/dashboard/">
        <img src="/portal/static/img/rehumile-logo.jpeg" style="height:36px;object-fit:contain" alt="Rehumile TMW">
      </a>
      <ul class="sidebar-nav"></ul>
    </div>
  </nav>
  <div class="main">
    <nav class="navbar navbar-expand navbar-light navbar-bg">
      <a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
      <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">
              <i class="align-middle me-1" data-feather="user"></i><span class="text-dark" id="navUserName">…</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <span class="dropdown-item-text small text-muted" id="navUserRole"></span>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#" id="logoutBtn"><i class="align-middle me-1" data-feather="log-out"></i> Sign out</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <main class="content">
      <div class="container-fluid p-0">
        <h1 class="h3 mb-3"><strong>Point of Sale</strong></h1>
        <div class="row">
          <!-- Left: product catalog -->
          <div class="col-12 col-lg-7">
            <div class="card mb-3">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">Catalogue</h5>
                <input class="form-control form-control-sm w-50" id="catalogSearch" placeholder="Search items…">
              </div>
              <div class="card-body p-0">
                <div id="catalogLoading" class="text-center py-3 text-muted">Loading items…</div>
                <div id="catalogGrid" class="p-2" style="display:none">
                  <div class="row g-2" id="catalogItems"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: cart + payment -->
          <div class="col-12 col-lg-5">
            <div class="card mb-3">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">Cart</h5>
                <button class="btn btn-sm btn-outline-danger" id="clearCart">Clear</button>
              </div>
              <div class="card-body p-0">
                <div id="cartEmpty" class="text-center py-3 text-muted">
                  <i data-feather="shopping-cart" style="opacity:.3"></i><br>Cart is empty
                </div>
                <div id="cartItems" style="display:none">
                  <table class="table table-sm mb-0">
                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th></th></tr></thead>
                    <tbody id="cartTbody"></tbody>
                  </table>
                  <div class="p-3 border-top">
                    <div class="d-flex justify-content-between mb-1"><span>Subtotal</span><strong id="cartSubtotal">R 0.00</strong></div>
                    <div class="d-flex justify-content-between mb-1 text-muted small"><span>VAT (15%)</span><span id="cartVat">R 0.00</span></div>
                    <div class="d-flex justify-content-between fw-bold border-top pt-2"><span>Total</span><span id="cartTotal">R 0.00</span></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header"><h5 class="card-title mb-0">Payment</h5></div>
              <div class="card-body">
                <div id="payAlert" class="alert d-none" role="alert"></div>
                <div class="mb-2"><label class="form-label">Job Card Reference</label><input class="form-control form-control-sm" id="payJobCard" placeholder="e.g. JC-0012 (optional)"></div>
                <div class="mb-2"><label class="form-label">Payment Method *</label>
                  <select class="form-select form-select-sm" id="payMethod">
                    <option value="cash">Cash</option><option value="card">Card</option><option value="eft">EFT / Transfer</option>
                  </select>
                </div>
                <div class="mb-3"><label class="form-label">Description / Note</label><input class="form-control form-control-sm" id="payDesc" placeholder="e.g. Laptop repair parts + labour"></div>
                <button class="btn btn-success w-100" id="payBtn" disabled>
                  <span id="paySpinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
                  <i class="align-middle me-1" data-feather="check-circle"></i>Process Payment
                </button>
              </div>
            </div>

            <!-- Receipt -->
            <div id="receiptSection" class="mt-3" style="display:none">
              <div id="receipt"></div>
              <button class="btn btn-outline-secondary btn-sm w-100 mt-2" id="printReceiptBtn">
                <i class="align-middle me-1" data-feather="printer"></i>Print Receipt
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer"><div class="container-fluid"><p class="mb-0 text-muted">Rehumile TMW IMS &copy; 2025</p></div></footer>
  </div>
</div>
<script src="/portal/static/js/app.js"></script>
<script src="/portal/static/js/hq-sidebar-menu.js"></script>
<script>(function(){function _i(){var s=document.querySelector('.js-sidebar'),t=document.querySelector('.js-sidebar-toggle');if(!s||!t)return;t.addEventListener('click',function(){setTimeout(function(){localStorage.setItem('ims_sidebar',s.classList.contains('collapsed')?'open':'closed');},50);});}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',_i):_i();})();</script>
<script>
(function(){
  const token=localStorage.getItem('ims_access');
  if(!token){window.location.href='/portal/login/';return;}
  const u=JSON.parse(localStorage.getItem('ims_user')||'{}');
  document.getElementById('navUserName').textContent=((u.first_name||'')+' '+(u.last_name||'')).trim()||u.email||'Staff';
  document.getElementById('navUserRole').textContent=u.role||'';
  document.getElementById('logoutBtn').onclick=e=>{e.preventDefault();localStorage.clear();window.location.href='/portal/login/';};
  if(!['admin','cashier','finance'].includes(u.role)){window.location.href='/portal/dashboard/';return;}

  let allItems=[];let cart=[];

  async function api(url,opts={}){
    const r=await fetch(url,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
    if(r.status===401){localStorage.clear();window.location.href='/portal/login/';throw new Error('Unauth');}
    return r;
  }

  async function loadCatalog(){
    try{
      const r=await api('/portal/api/inventory/?type=consumable');
      const data=await r.json();allItems=data.results||[];
      renderCatalog(allItems);
    }catch(e){if(e.message!=='Unauth')document.getElementById('catalogLoading').textContent='Failed to load.';}
  }

  function renderCatalog(items){
    document.getElementById('catalogLoading').style.display='none';
    document.getElementById('catalogGrid').style.display='block';
    document.getElementById('catalogItems').innerHTML=items.filter(i=>i.quantity_on_hand>0).map(i=>`
      <div class="col-6 col-md-4">
        <div class="card pos-item h-100" data-id="${i.id}" data-name="${i.name}" data-price="${i.selling_price}" data-qty="${i.quantity_on_hand}">
          <div class="card-body p-2 text-center">
            <i data-feather="package" style="width:32px;height:32px;color:#6c757d"></i>
            <p class="mb-1 fw-bold small mt-1">${i.name}</p>
            <p class="mb-0 text-success small">R ${parseFloat(i.selling_price).toFixed(2)}</p>
            <p class="mb-0 text-muted" style="font-size:11px">Stock: ${i.quantity_on_hand}</p>
          </div>
        </div>
      </div>`).join('');
    document.querySelectorAll('.pos-item').forEach(el=>{
      el.addEventListener('click',()=>addToCart(el.dataset.id,el.dataset.name,parseFloat(el.dataset.price),parseInt(el.dataset.qty)));
    });
    if(window.feather)feather.replace();
  }

  document.getElementById('catalogSearch').addEventListener('input',function(){
    const q=this.value.toLowerCase();
    renderCatalog(allItems.filter(i=>i.name.toLowerCase().includes(q)));
  });

  function addToCart(id,name,price,maxQty){
    const ex=cart.find(c=>c.id===id);
    if(ex){if(ex.qty<maxQty)ex.qty++;else{alert('Max stock: '+maxQty);return;}}
    else cart.push({id,name,price,qty:1,maxQty});
    renderCart();
  }

  function renderCart(){
    if(!cart.length){
      document.getElementById('cartEmpty').style.display='block';
      document.getElementById('cartItems').style.display='none';
      document.getElementById('payBtn').disabled=true;
      return;
    }
    document.getElementById('cartEmpty').style.display='none';
    document.getElementById('cartItems').style.display='block';
    document.getElementById('payBtn').disabled=false;
    document.getElementById('cartTbody').innerHTML=cart.map((c,i)=>`
      <tr>
        <td class="small">${c.name}</td>
        <td><div class="input-group input-group-sm" style="width:80px">
          <button class="btn btn-outline-secondary qty-minus" data-idx="${i}">-</button>
          <span class="input-group-text">${c.qty}</span>
          <button class="btn btn-outline-secondary qty-plus" data-idx="${i}">+</button>
        </div></td>
        <td class="small">R ${(c.price*c.qty).toFixed(2)}</td>
        <td><button class="btn btn-sm btn-link text-danger cart-remove p-0" data-idx="${i}"><i data-feather="x" style="width:14px;height:14px"></i></button></td>
      </tr>`).join('');
    const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
    const vat=sub*0.15;const total=sub+vat;
    document.getElementById('cartSubtotal').textContent='R '+sub.toFixed(2);
    document.getElementById('cartVat').textContent='R '+vat.toFixed(2);
    document.getElementById('cartTotal').textContent='R '+total.toFixed(2);
    document.querySelectorAll('.qty-minus').forEach(b=>b.addEventListener('click',()=>{if(cart[b.dataset.idx].qty>1)cart[b.dataset.idx].qty--;else cart.splice(b.dataset.idx,1);renderCart();}));
    document.querySelectorAll('.qty-plus').forEach(b=>b.addEventListener('click',()=>{const c=cart[b.dataset.idx];if(c.qty<c.maxQty)c.qty++;renderCart();}));
    document.querySelectorAll('.cart-remove').forEach(b=>b.addEventListener('click',()=>{cart.splice(b.dataset.idx,1);renderCart();}));
    if(window.feather)feather.replace();
  }

  document.getElementById('clearCart').addEventListener('click',()=>{cart=[];renderCart();});

  document.getElementById('payBtn').addEventListener('click',async()=>{
    if(!cart.length)return;
    const btn=document.getElementById('payBtn');
    const spin=document.getElementById('paySpinner');
    const alert=document.getElementById('payAlert');
    btn.disabled=true;spin.classList.remove('d-none');alert.className='alert d-none';
    const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
    const total=sub*1.15;
    const desc=document.getElementById('payDesc').value.trim()||'POS Sale — '+cart.map(c=>c.name).join(', ');
    try{
      const r=await api('/portal/api/cash-transactions/',{method:'POST',body:JSON.stringify({
        amount:total.toFixed(2),
        payment_method:document.getElementById('payMethod').value,
        cash_flow_stream:'ocf',
        description:desc,
      })});
      if(r.ok){
        // Deduct stock for each item
        for(const c of cart){
          await api('/portal/api/inventory/transactions/',{method:'POST',body:JSON.stringify({
            item_id:c.id,transaction_type:'out',quantity:c.qty,
            reference:document.getElementById('payJobCard').value.trim()||'POS-'+Date.now(),
            notes:'POS sale',
          })}).catch(()=>{});
        }
        // Show receipt
        const now=new Date();
        document.getElementById('receiptSection').style.display='block';
        document.getElementById('receipt').innerHTML=`<div style="text-align:center;margin-bottom:8px"><strong>REHUMILE TMW</strong><br><small>Receipt — ${now.toLocaleString('en-ZA')}</small></div>
<hr style="border-top:1px dashed #ccc">
${cart.map(c=>`${c.name.padEnd(20,' ')} x${c.qty}   R${(c.price*c.qty).toFixed(2)}`).join('<br>')}
<hr style="border-top:1px dashed #ccc">
<div>Subtotal: R${sub.toFixed(2)}</div>
<div>VAT 15%: R${(sub*.15).toFixed(2)}</div>
<div><strong>TOTAL: R${total.toFixed(2)}</strong></div>
<hr style="border-top:1px dashed #ccc">
<div style="text-align:center;font-size:11px">Thank you for your business!</div>`;
        alert.className='alert alert-success';alert.textContent='Payment processed. R '+total.toFixed(2);
        cart=[];renderCart();
        if(window.feather)feather.replace();
        loadCatalog();
      }else{
        const err=await r.json().catch(()=>({}));
        alert.className='alert alert-danger';alert.textContent=err.detail||'Payment failed.';
      }
    }catch(e){if(e.message!=='Unauth'){alert.className='alert alert-danger';alert.textContent='Network error.';}}
    finally{btn.disabled=false;spin.classList.add('d-none');}
  });

  document.getElementById('printReceiptBtn').addEventListener('click',()=>{
    const w=window.open('','_blank');
    w.document.write('<!DOCTYPE html><html><body style="font-family:monospace;padding:20px">'+document.getElementById('receipt').innerHTML+'<script>window.onload=()=>window.print();<\/script></body></html>');
    w.document.close();
  });

  loadCatalog();
})();
</script>
</body>
</html>
