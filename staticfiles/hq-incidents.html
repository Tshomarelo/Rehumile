<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/portal/static/img/icons/icon-48x48.png"/>
  <title>Incidents | Rehumile IMS</title>
  <link href="/portal/static/css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <nav id="sidebar" class="sidebar js-sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand d-flex align-items-center p-2" href="/portal/dashboard/">
        <img src="/portal/static/img/rehumile-logo.jpeg" style="height:36px;object-fit:contain" alt="Rehumile TMW">
      </a>
      <ul class="sidebar-nav"></ul>
    </div>
  </nav>
  <div class="main">
    <nav class="navbar navbar-expand navbar-light navbar-bg">
      <a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
      <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">
              <i class="align-middle me-1" data-feather="user"></i><span class="text-dark" id="navUserName">…</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <span class="dropdown-item-text small text-muted" id="navUserRole"></span>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#" id="logoutBtn"><i class="align-middle me-1" data-feather="log-out"></i> Sign out</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <main class="content">
      <div class="container-fluid p-0">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h1 class="h3 mb-0"><strong>Incidents</strong></h1>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="align-middle me-1" data-feather="plus"></i> New Incident
          </button>
        </div>
        <div id="pageAlert"></div>
        <!-- Filters -->
        <div class="card mb-3">
          <div class="card-body py-2">
            <div class="row g-2 align-items-center">
              <div class="col-auto"><label class="col-form-label">Filter:</label></div>
              <div class="col-auto">
                <select class="form-select form-select-sm" id="filterStatus">
                  <option value="">All Statuses</option>
                  <option value="open">Open</option>
                  <option value="in_progress">In Progress</option>
                  <option value="resolved">Resolved</option>
                  <option value="closed">Closed</option>
                </select>
              </div>
              <div class="col-auto">
                <select class="form-select form-select-sm" id="filterPriority">
                  <option value="">All Priorities</option>
                  <option value="critical">Critical</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                </select>
              </div>
              <div class="col-auto"><button class="btn btn-sm btn-outline-secondary" id="applyFilter">Apply</button></div>
              <div class="col-auto"><button class="btn btn-sm btn-outline-secondary" id="clearFilter">Clear</button></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="card-title mb-0">All Incidents</h5>
            <span class="badge bg-secondary" id="incidentCount">Loading…</span>
          </div>
          <div class="card-body p-0">
            <div id="tableLoading" class="text-center py-4 text-muted">Loading…</div>
            <div class="table-responsive" id="tableWrapper" style="display:none">
              <table class="table table-hover my-0">
                <thead><tr>
                  <th>Ticket ID</th><th>Title</th><th class="d-none d-md-table-cell">Company</th>
                  <th>Status</th><th class="d-none d-lg-table-cell">Priority</th>
                  <th class="d-none d-lg-table-cell">Assigned To</th><th class="d-none d-xl-table-cell">SLA</th><th>Created</th>
                </tr></thead>
                <tbody id="incidentTbody"></tbody>
              </table>
            </div>
            <div id="tableEmpty" class="text-center py-4 text-muted" style="display:none">No incidents found.</div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer"><div class="container-fluid"><p class="mb-0 text-muted">Rehumile TMW IMS &copy; 2025</p></div></footer>
  </div>
</div>

<!-- Create Incident Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">New Incident</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="createAlert"></div>
        <form id="createForm">
          <div class="mb-3"><label class="form-label">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="c_title" required maxlength="255"></div>
          <div class="mb-3"><label class="form-label">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" id="c_desc" rows="4" required></textarea></div>
          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">Category <span class="text-danger">*</span></label>
              <select class="form-select" id="c_category" required>
                <option value="">Select category…</option>
                <option value="hardware">Hardware</option>
                <option value="software">Software</option>
                <option value="network">Network</option>
                <option value="security">Security</option>
              </select></div>
            <div class="col-md-6 mb-3"><label class="form-label">Priority</label>
              <select class="form-select" id="c_priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select></div>
          </div>
          <div class="mb-3" id="companyField"><label class="form-label">Company <span class="text-danger">*</span></label>
            <select class="form-select" id="c_company"><option value="">Loading companies…</option></select></div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="c_billable">
            <label class="form-check-label" for="c_billable">Mark as Billable</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="createSubmit">Create Incident</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail/Edit Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailTitle">Incident Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="detailAlert"></div>
        <div class="row">
          <div class="col-md-8">
            <table class="table table-sm table-bordered" id="detailTable"></table>
            <hr>
            <h6>Change Status</h6>
            <div class="d-flex gap-2 mb-3">
              <select class="form-select form-select-sm w-auto" id="d_status">
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
                <option value="closed">Closed</option>
              </select>
              <button class="btn btn-sm btn-primary" id="updateStatus">Update Status</button>
            </div>
            <h6>Assign Agent</h6>
            <div class="d-flex gap-2 mb-3">
              <select class="form-select form-select-sm w-auto" id="d_agent">
                <option value="">Loading agents…</option>
              </select>
              <button class="btn btn-sm btn-secondary" id="assignAgent">Assign</button>
            </div>
          </div>
          <div class="col-md-4">
            <h6>Comments</h6>
            <div id="commentsList" class="mb-3" style="max-height:300px;overflow-y:auto"></div>
            <div class="mb-2"><textarea class="form-control form-control-sm" id="commentText" rows="3" placeholder="Add a comment…"></textarea></div>
            <div class="d-flex align-items-center justify-content-between">
              <div class="form-check form-check-sm">
                <input type="checkbox" class="form-check-input" id="commentInternal">
                <label class="form-check-label small" for="commentInternal">Internal (HQ only)</label>
              </div>
              <button class="btn btn-sm btn-outline-primary" id="addComment">Post</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/portal/static/js/app.js"></script>
<script src="/portal/static/js/hq-sidebar-menu.js"></script>
<script>(function(){function _i(){var s=document.querySelector('.js-sidebar'),t=document.querySelector('.js-sidebar-toggle');if(!s||!t)return;if(window.innerWidth<992&&localStorage.getItem('ims_sidebar')==='open')s.classList.add('collapsed');t.addEventListener('click',function(){setTimeout(function(){localStorage.setItem('ims_sidebar',s.classList.contains('collapsed')?'open':'closed');},50);});}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',_i):_i();})();</script>
<script>
(function(){
  const token = localStorage.getItem('ims_access');
  if(!token){ window.location.href='/portal/login/'; return; }
  const userData = JSON.parse(localStorage.getItem('ims_user')||'{}');
  if(!['admin','agent','finance'].includes(userData.role)){ window.location.href='/portal/client/'; return; }
  document.getElementById('navUserName').textContent = ((userData.first_name||'')+' '+(userData.last_name||'')).trim()||userData.email||'User';
  document.getElementById('navUserRole').textContent = (userData.role||'').toUpperCase();
  document.getElementById('logoutBtn').onclick = e=>{ e.preventDefault(); localStorage.clear(); window.location.href='/portal/login/'; };

  async function api(url, opts={}){
    const r = await fetch(url,{...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
    if(r.status===401){ localStorage.clear(); window.location.href='/portal/login/'; throw new Error('Unauth'); }
    return r;
  }
  function showAlert(id, msg, type='danger'){
    document.getElementById(id).innerHTML=`<div class="alert alert-${type} alert-dismissible"><button type="button" class="btn-close" data-bs-dismiss="alert"></button>${msg}</div>`;
  }
  const sBadge=s=>({'open':'<span class="badge bg-warning text-dark">Open</span>','in_progress':'<span class="badge bg-primary">In Progress</span>','resolved':'<span class="badge bg-success">Resolved</span>','closed':'<span class="badge bg-secondary">Closed</span>'}[s]||`<span class="badge bg-secondary">${s}</span>`);
  const pBadge=p=>({'critical':'<span class="badge bg-danger">Critical</span>','high':'<span class="badge bg-warning text-dark">High</span>','medium':'<span class="badge bg-info text-dark">Medium</span>','low':'<span class="badge bg-secondary">Low</span>'}[p]||`<span class="badge bg-secondary">${p}</span>`);
  const fmtDate=d=>d?new Date(d).toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'}):'—';

  let allIncidents=[], currentId=null;

  async function loadIncidents(){
    try{
      const r = await api('/portal/api/incidents/');
      const _ij=await r.json(); allIncidents=Array.isArray(_ij)?_ij:(_ij.results||[]);
      renderTable(allIncidents);
    }catch(e){ if(e.message!=='Unauth') showAlert('pageAlert','Failed to load incidents.'); }
  }

  function renderTable(data){
    document.getElementById('tableLoading').style.display='none';
    document.getElementById('incidentCount').textContent=data.length+' record'+(data.length!==1?'s':'');
    if(!data.length){ document.getElementById('tableEmpty').style.display='block'; document.getElementById('tableWrapper').style.display='none'; return; }
    document.getElementById('tableEmpty').style.display='none';
    document.getElementById('tableWrapper').style.display='block';
    document.getElementById('incidentTbody').innerHTML=data.map(i=>`
      <tr style="cursor:pointer" onclick="openDetail('${i.id}')">
        <td><code>${i.ticket_id||i.id.slice(0,8)}</code></td>
        <td>${i.title}</td>
        <td class="d-none d-md-table-cell">${i.company_name||'—'}</td>
        <td>${sBadge(i.status)}</td>
        <td class="d-none d-lg-table-cell">${pBadge(i.priority)}</td>
        <td class="d-none d-lg-table-cell">${i.assigned_to_name||'<span class="text-muted">Unassigned</span>'}</td>
        <td class="d-none d-xl-table-cell">${i.is_sla_breached?'<span class="badge bg-danger">Breached</span>':'<span class="badge bg-success">OK</span>'}</td>
        <td>${fmtDate(i.created_at)}</td>
      </tr>`).join('');
  }

  // Load companies for create form
  async function loadCompanies(){
    try{
      const r = await api('/portal/api/companies/');
      const _cj=await r.json(); const companies=Array.isArray(_cj)?_cj:(_cj.results||[]);
      const sel = document.getElementById('c_company');
      sel.innerHTML='<option value="">Select company…</option>'+companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    }catch{}
  }

  document.getElementById('createModal').addEventListener('show.bs.modal',()=>{ loadCompanies(); });

  document.getElementById('createSubmit').onclick = async()=>{
    const title=document.getElementById('c_title').value.trim();
    const desc=document.getElementById('c_desc').value.trim();
    const cat=document.getElementById('c_category').value;
    const priority=document.getElementById('c_priority').value;
    const company=document.getElementById('c_company').value;
    const billable=document.getElementById('c_billable').checked;
    if(!title||!desc||!cat||!company){ showAlert('createAlert','Please fill in all required fields.'); return; }
    try{
      const r = await api('/portal/api/incidents/',{method:'POST',body:JSON.stringify({title,description:desc,category:cat,priority,is_billable:billable,company})});
      const data = await r.json();
      if(r.ok){
        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
        document.getElementById('createForm').reset();
        showAlert('pageAlert','Incident created successfully.','success');
        loadIncidents();
      } else { showAlert('createAlert',JSON.stringify(data)); }
    }catch(e){ if(e.message!=='Unauth') showAlert('createAlert','Failed to create incident.'); }
  };

  document.getElementById('applyFilter').onclick=()=>{
    const s=document.getElementById('filterStatus').value;
    const p=document.getElementById('filterPriority').value;
    renderTable(allIncidents.filter(i=>(s?i.status===s:true)&&(p?i.priority===p:true)));
  };
  document.getElementById('clearFilter').onclick=()=>{
    document.getElementById('filterStatus').value='';
    document.getElementById('filterPriority').value='';
    renderTable(allIncidents);
  };

  // Detail modal
  window.openDetail = async function(id){
    currentId=id;
    const inc = allIncidents.find(i=>i.id===id);
    if(!inc) return;
    document.getElementById('detailTitle').textContent=`${inc.ticket_id||'Incident'} — ${inc.title}`;
    document.getElementById('d_status').value=inc.status;
    document.getElementById('detailTable').innerHTML=`
      <tr><th>Ticket ID</th><td><code>${inc.ticket_id}</code></td><th>Status</th><td>${sBadge(inc.status)}</td></tr>
      <tr><th>Category</th><td>${inc.category||'—'}</td><th>Priority</th><td>${pBadge(inc.priority)}</td></tr>
      <tr><th>Company</th><td>${inc.company_name||'—'}</td><th>SLA Type</th><td>${inc.sla_type||'—'}</td></tr>
      <tr><th>Submitted By</th><td>${inc.submitted_by_name||'—'}</td><th>Assigned To</th><td>${inc.assigned_to_name||'Unassigned'}</td></tr>
      <tr><th>SLA Breached</th><td>${inc.is_sla_breached?'<span class="text-danger">Yes</span>':'<span class="text-success">No</span>'}</td><th>Billable</th><td>${inc.is_billable?'Yes':'No'}</td></tr>
      <tr><th colspan="4" class="bg-light">Description</th></tr>
      <tr><td colspan="4">${(inc.description||'—').replace(/\n/g,'<br>')}</td></tr>`;
    bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal')).show();
    // Load agents
    try{
      const r2 = await api('/portal/api/users/');
      const _uj=await r2.json(); const users=Array.isArray(_uj)?_uj:(_uj.results||[]);
      const agents = users.filter(u=>u.role==='agent'||u.role==='admin');
      document.getElementById('d_agent').innerHTML='<option value="">Select agent…</option>'+agents.map(a=>`<option value="${a.id}">${((a.first_name||'')+' '+(a.last_name||'')).trim()||a.email}</option>`).join('');
      if(inc.assigned_to) document.getElementById('d_agent').value=inc.assigned_to;
    }catch{}
    // Load comments
    try{
      const r3 = await api(`/portal/api/incidents/${id}/comments/`);
      const _cmj=await r3.json(); const comments=Array.isArray(_cmj)?_cmj:(_cmj.results||[]);
      document.getElementById('commentsList').innerHTML=comments.length?comments.map(c=>`
        <div class="border rounded p-2 mb-2 ${c.is_internal?'bg-warning bg-opacity-10':''}">
          <div class="d-flex justify-content-between"><strong class="small">${c.author_name}</strong><small class="text-muted">${fmtDate(c.created_at)}</small></div>
          ${c.is_internal?'<span class="badge bg-warning text-dark me-1 small">Internal</span>':''}
          <div class="small mt-1">${(c.comment_text||'').replace(/\n/g,'<br>')}</div>
        </div>`).join(''):'<p class="text-muted small">No comments yet.</p>';
    }catch{}
  };

  document.getElementById('updateStatus').onclick=async()=>{
    if(!currentId) return;
    const s=document.getElementById('d_status').value;
    try{
      const r=await api(`/portal/api/incidents/${currentId}/status/`,{method:'PATCH',body:JSON.stringify({status:s})});
      if(r.ok){ showAlert('detailAlert','Status updated.','success'); loadIncidents(); }
      else{ const d=await r.json(); showAlert('detailAlert',d.detail||'Failed to update status.'); }
    }catch(e){ if(e.message!=='Unauth') showAlert('detailAlert','Error updating status.'); }
  };

  document.getElementById('assignAgent').onclick=async()=>{
    const agentId=document.getElementById('d_agent').value;
    if(!agentId||!currentId) return;
    try{
      const r=await api(`/portal/api/incidents/${currentId}/assign/`,{method:'PATCH',body:JSON.stringify({agent_id:agentId})});
      if(r.ok){ showAlert('detailAlert','Agent assigned.','success'); loadIncidents(); }
      else{ const d=await r.json(); showAlert('detailAlert',d.detail||'Failed to assign agent.'); }
    }catch(e){ if(e.message!=='Unauth') showAlert('detailAlert','Error assigning agent.'); }
  };

  document.getElementById('addComment').onclick=async()=>{
    const text=document.getElementById('commentText').value.trim();
    const internal=document.getElementById('commentInternal').checked;
    if(!text||!currentId) return;
    try{
      const r=await api(`/portal/api/incidents/${currentId}/comments/`,{method:'POST',body:JSON.stringify({comment_text:text,is_internal:internal})});
      if(r.ok){
        document.getElementById('commentText').value='';
        document.getElementById('commentInternal').checked=false;
        window.openDetail(currentId);
      } else{ const d=await r.json(); showAlert('detailAlert',d.detail||'Failed to post comment.'); }
    }catch(e){ if(e.message!=='Unauth') showAlert('detailAlert','Error posting comment.'); }
  };

  loadIncidents();
})();
</script>
</body>
</html>
