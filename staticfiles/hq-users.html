<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="shortcut icon" href="/portal/static/img/icons/icon-48x48.png"/>
  <title>Users | Rehumile IMS</title>
  <link href="/portal/static/css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrapper">
  <nav id="sidebar" class="sidebar js-sidebar">
    <div class="sidebar-content js-simplebar">
      <a class="sidebar-brand d-flex align-items-center p-2" href="/portal/dashboard/">
        <img src="/portal/static/img/rehumile-logo.jpeg" style="height:36px;object-fit:contain" alt="Rehumile TMW">
      </a>
      <ul class="sidebar-nav"></ul>
    </div>
  </nav>
  <div class="main">
    <nav class="navbar navbar-expand navbar-light navbar-bg">
      <a class="sidebar-toggle js-sidebar-toggle"><i class="hamburger align-self-center"></i></a>
      <div class="navbar-collapse collapse">
        <ul class="navbar-nav navbar-align">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-none d-sm-inline-block" href="#" data-bs-toggle="dropdown">
              <i class="align-middle me-1" data-feather="user"></i><span class="text-dark" id="navUserName">…</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <span class="dropdown-item-text small text-muted" id="navUserRole"></span>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#" id="logoutBtn"><i class="align-middle me-1" data-feather="log-out"></i> Sign out</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <main class="content">
      <div class="container-fluid p-0">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h1 class="h3 mb-0"><strong>Users</strong></h1>
          <button class="btn btn-primary" id="newUserBtn">
            <i class="align-middle me-1" data-feather="user-plus"></i> Add User
          </button>
        </div>
        <div id="pageAlert"></div>
        <div class="card">
          <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="card-title mb-0">Portal Users</h5>
            <span class="badge bg-secondary" id="userCount">Loading…</span>
          </div>
          <div class="card-body p-0">
            <div id="tableLoading" class="text-center py-4 text-muted">Loading…</div>
            <div class="table-responsive" id="tableWrapper" style="display:none">
              <table class="table table-hover my-0">
                <thead><tr>
                  <th>Name</th><th>Email</th><th>Role</th>
                  <th class="d-none d-md-table-cell">Company</th>
                  <th>Status</th><th class="d-none d-lg-table-cell">Joined</th><th>Actions</th>
                </tr></thead>
                <tbody id="userTbody"></tbody>
              </table>
            </div>
            <div id="tableEmpty" class="text-center py-4 text-muted" style="display:none">No users found.</div>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer"><div class="container-fluid"><p class="mb-0 text-muted">Rehumile TMW IMS &copy; 2025</p></div></footer>
  </div>
</div>

<!-- Create User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <form id="userForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="f_first_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="f_last_name" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address <span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="f_email" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Role <span class="text-danger">*</span></label>
              <select class="form-select" id="f_role" required>
                <option value="">Select role…</option>
                <option value="admin">Admin (HQ)</option>
                <option value="agent">Agent (HQ Support)</option>
                <option value="finance">Finance (HQ)</option>
                <option value="client">Client</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Company</label>
              <select class="form-select" id="f_company">
                <option value="">No company (HQ staff)</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="f_password" required minlength="8" placeholder="Minimum 8 characters">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="f_password2" required minlength="8">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="saveUserBtn">Create User</button>
      </div>
    </div>
  </div>
</div>

<!-- Status Update Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Update User Status</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <p>Change status for <strong id="statusUserName"></strong>:</p>
        <input type="hidden" id="statusUserId">
        <div class="d-grid gap-2">
          <button class="btn btn-success" onclick="setStatus('active',this)">Activate</button>
          <button class="btn btn-warning" onclick="setStatus('suspended',this)">Suspend</button>
          <button class="btn btn-secondary" onclick="setStatus('inactive',this)">Deactivate</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/portal/static/js/app.js"></script>
<script src="/portal/static/js/hq-sidebar-menu.js"></script>
<script>(function(){function _i(){var s=document.querySelector('.js-sidebar'),t=document.querySelector('.js-sidebar-toggle');if(!s||!t)return;if(window.innerWidth<992&&localStorage.getItem('ims_sidebar')==='open')s.classList.add('collapsed');t.addEventListener('click',function(){setTimeout(function(){localStorage.setItem('ims_sidebar',s.classList.contains('collapsed')?'open':'closed');},50);});}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',_i):_i();})();</script>
<script>
(function(){
  const token = localStorage.getItem('ims_access');
  if(!token){ window.location.href='/portal/login/'; return; }
  const userData = JSON.parse(localStorage.getItem('ims_user')||'{}');
  if(!['admin','agent','finance'].includes(userData.role)){ window.location.href='/portal/client/'; return; }
  document.getElementById('navUserName').textContent=((userData.first_name||'')+' '+(userData.last_name||'')).trim()||userData.email||'User';
  document.getElementById('navUserRole').textContent=(userData.role||'').toUpperCase();
  document.getElementById('logoutBtn').onclick=e=>{ e.preventDefault(); localStorage.clear(); window.location.href='/portal/login/'; };

  async function api(url, opts={}){
    const r=await fetch(url,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});
    if(r.status===401){ localStorage.clear(); window.location.href='/portal/login/'; throw new Error('Unauth'); }
    return r;
  }
  function showAlert(id, msg, type='danger'){
    document.getElementById(id).innerHTML=`<div class="alert alert-${type} alert-dismissible"><button type="button" class="btn-close" data-bs-dismiss="alert"></button>${msg}</div>`;
  }
  const roleBadge=r=>({'admin':'<span class="badge bg-danger">Admin</span>','agent':'<span class="badge bg-primary">Agent</span>','finance':'<span class="badge bg-info text-dark">Finance</span>','client':'<span class="badge bg-secondary">Client</span>','viewer':'<span class="badge bg-light text-dark border">Viewer</span>'}[r]||`<span class="badge bg-secondary">${r}</span>`);
  const statusBadge=s=>({'active':'<span class="badge bg-success">Active</span>','inactive':'<span class="badge bg-secondary">Inactive</span>','suspended':'<span class="badge bg-warning text-dark">Suspended</span>'}[s]||`<span class="badge bg-secondary">${s}</span>`);
  const fmtDate=d=>d?new Date(d).toLocaleDateString('en-ZA',{year:'numeric',month:'short',day:'numeric'}):'—';

  async function loadCompaniesIntoSelect(){
    try{
      const r=await api('/portal/api/companies/');
      const _cj=await r.json(); const companies=Array.isArray(_cj)?_cj:(_cj.results||[]);
      const sel=document.getElementById('f_company');
      sel.innerHTML='<option value="">No company (HQ staff)</option>'+companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    }catch{}
  }

  async function loadUsers(){
    try{
      const r=await api('/portal/api/users/');
      const _j=await r.json(); const data=Array.isArray(_j)?_j:(_j.results||[]);
      document.getElementById('tableLoading').style.display='none';
      document.getElementById('userCount').textContent=data.length+' record'+(data.length!==1?'s':'');
      if(!data.length){ document.getElementById('tableEmpty').style.display='block'; return; }
      document.getElementById('tableWrapper').style.display='block';
      document.getElementById('userTbody').innerHTML=data.map(u=>`
        <tr>
          <td><strong>${((u.first_name||'')+' '+(u.last_name||'')).trim()||'—'}</strong></td>
          <td>${u.email}</td>
          <td>${roleBadge(u.role)}</td>
          <td class="d-none d-md-table-cell">${u.company_name||'<span class="text-muted">HQ</span>'}</td>
          <td>${statusBadge(u.status)}</td>
          <td class="d-none d-lg-table-cell">${fmtDate(u.created_at)}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" onclick="openStatus('${u.id}','${((u.first_name||'')+' '+(u.last_name||'')).trim()||u.email}')">Status</button>
          </td>
        </tr>`).join('');
    }catch(e){ if(e.message!=='Unauth') showAlert('pageAlert','Failed to load users.'); }
  }

  document.getElementById('newUserBtn').onclick=()=>{
    document.getElementById('userForm').reset();
    document.getElementById('modalAlert').innerHTML='';
    loadCompaniesIntoSelect();
    bootstrap.Modal.getOrCreateInstance(document.getElementById('userModal')).show();
  };

  document.getElementById('saveUserBtn').onclick=async()=>{
    const first=document.getElementById('f_first_name').value.trim();
    const last=document.getElementById('f_last_name').value.trim();
    const email=document.getElementById('f_email').value.trim();
    const role=document.getElementById('f_role').value;
    const company=document.getElementById('f_company').value;
    const pass=document.getElementById('f_password').value;
    const pass2=document.getElementById('f_password2').value;
    if(!first||!last||!email||!role||!pass){ showAlert('modalAlert','All required fields must be filled.'); return; }
    if(pass!==pass2){ showAlert('modalAlert','Passwords do not match.'); return; }
    if(pass.length<8){ showAlert('modalAlert','Password must be at least 8 characters.'); return; }
    const body={first_name:first,last_name:last,email,role,password:pass};
    if(company) body.company=company;
    const btn=document.getElementById('saveUserBtn');
    const orig=btn.innerHTML;
    btn.disabled=true;
    btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Creating…';
    try{
      const r=await api('/portal/api/users/',{method:'POST',body:JSON.stringify(body)});
      const data=await r.json();
      if(r.ok){
        bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
        showAlert('pageAlert','User created successfully.','success');
        loadUsers();
      } else { showAlert('modalAlert',data.email?data.email[0]:data.detail||JSON.stringify(data)); }
    }catch(e){ if(e.message!=='Unauth') showAlert('modalAlert','Failed to create user.'); }
    btn.disabled=false;
    btn.innerHTML=orig;
  };

  window.openStatus=function(id, name){
    document.getElementById('statusUserId').value=id;
    document.getElementById('statusUserName').textContent=name;
    bootstrap.Modal.getOrCreateInstance(document.getElementById('statusModal')).show();
  };

  window.setStatus=async function(newStatus, btnEl){
    const id=document.getElementById('statusUserId').value;
    if(!id) return;
    const btn=btnEl||event.currentTarget;
    const orig=btn.innerHTML;
    btn.disabled=true;
    btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>Updating…';
    try{
      const r=await api(`/portal/api/users/${id}/status/`,{method:'PATCH',body:JSON.stringify({status:newStatus})});
      if(r.ok){
        bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
        showAlert('pageAlert','User status updated.','success');
        loadUsers();
      } else { const d=await r.json(); showAlert('pageAlert',d.detail||'Failed to update status.'); }
    }catch(e){ if(e.message!=='Unauth') showAlert('pageAlert','Error updating status.'); }
    btn.disabled=false;
    btn.innerHTML=orig;
  };

  loadUsers();
})();
</script>
</body>
</html>
