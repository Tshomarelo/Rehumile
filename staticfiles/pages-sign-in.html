<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" content="Rehumile TMW — Incident Management System">
        <meta name="author" content="Rehumile TMW">

        <link rel="shortcut icon" href="/portal/static/img/rehumile-logo.jpeg" />
        <title>Rehumile Portal — Sign In</title>

        <link href="/portal/static/css/app.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

        <style>
                :root {
                        --rtmw-primary: #1a3c5e;
                        --rtmw-secondary: #e8a020;
                }
                body {
                        background: linear-gradient(135deg, #f0f4f8 0%, #e8edf2 100%);
                }
                .brand-header {
                        background-color: var(--rtmw-primary);
                        padding: 12px 0;
                        text-align: center;
                }
                .brand-header img {
                        height: 48px;
                        object-fit: contain;
                }
                .brand-accent {
                        display: inline-block;
                        width: 48px;
                        height: 4px;
                        background-color: var(--rtmw-secondary);
                        border-radius: 2px;
                        margin: 10px auto 0;
                }
                .btn-primary, .btn-primary:hover {
                        background-color: var(--rtmw-primary) !important;
                        border-color: var(--rtmw-primary) !important;
                }
                .btn-primary:hover {
                        opacity: 0.9;
                }
                .card {
                        border-top: 4px solid var(--rtmw-secondary);
                        box-shadow: 0 4px 24px rgba(26,60,94,0.12);
                }
                #error-msg {
                        display: none;
                }
        </style>
</head>

<body>
        <div class="brand-header">
                <img src="/portal/static/img/rehumile-logo.jpeg" alt="Rehumile TMW Logo" />
        </div>

        <main class="d-flex w-100">
                <div class="container d-flex flex-column">
                        <div class="row vh-100">
                                <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5 mx-auto d-table h-100">
                                        <div class="d-table-cell align-middle">

                                                <div class="text-center mt-4">
                                                        <h1 class="h2" style="color:#1a3c5e;">Welcome back!</h1>
                                                        <p class="lead text-muted">
                                                                Sign in to your Rehumile Portal account
                                                        </p>
                                                        <div class="brand-accent"></div>
                                                </div>

                                                <div class="card mt-4">
                                                        <div class="card-body">
                                                                <div class="m-sm-3">
                                                                        <div id="error-msg" class="alert alert-danger" role="alert"></div>
                                                                        <form id="login-form">
                                                                                <div class="mb-3">
                                                                                        <label class="form-label">Email</label>
                                                                                        <input class="form-control form-control-lg" type="email" id="email" name="email" placeholder="Enter your email" required />
                                                                                </div>
                                                                                <div class="mb-3">
                                                                                        <label class="form-label">Password</label>
                                                                                        <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Enter your password" required />
                                                                                </div>
                                                                                <div class="d-grid gap-2 mt-3">
                                                                                        <button type="submit" id="login-btn" class="btn btn-lg btn-primary">
                                                                                                Sign in
                                                                                        </button>
                                                                                </div>
                                                                                <div class="text-center mt-3">
                                                                                        <a href="/portal/password-reset/" class="text-muted small">Forgot your password?</a>
                                                                                </div>
                                                                        </form>
                                                                </div>
                                                        </div>
                                                </div>

                                                <div class="text-center mb-3 mt-3">
                                                        <small class="text-muted">Rehumile TMW Incident Management System &copy; 2024</small>
                                                </div>
                                        </div>
                                </div>
                        </div>
                </div>
        </main>

        <script src="/portal/static/js/app.js"></script>
        <script>
                document.getElementById('login-form').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        const btn = document.getElementById('login-btn');
                        const errorDiv = document.getElementById('error-msg');
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;

                        btn.disabled = true;
                        btn.textContent = 'Signing in…';
                        errorDiv.style.display = 'none';

                        try {
                                const resp = await fetch('/portal/api/auth/login/', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ email, password })
                                });
                                const data = await resp.json();
                                if (resp.ok) {
                                        localStorage.setItem('ims_access', data.access);
                                        localStorage.setItem('ims_refresh', data.refresh);
                                        localStorage.setItem('ims_user', JSON.stringify(data.user));
                                        const role = data.user.role;
                                        if (role === 'client' || role === 'viewer') {
                                                window.location.href = '/portal/client/';
                                        } else {
                                                window.location.href = '/portal/dashboard/';
                                        }
                                } else {
                                        errorDiv.textContent = data.detail || 'Login failed. Please check your credentials.';
                                        errorDiv.style.display = 'block';
                                        btn.disabled = false;
                                        btn.textContent = 'Sign in';
                                }
                        } catch (err) {
                                errorDiv.textContent = 'Network error. Please try again.';
                                errorDiv.style.display = 'block';
                                btn.disabled = false;
                                btn.textContent = 'Sign in';
                        }
                });
        </script>
</body>

</html>
